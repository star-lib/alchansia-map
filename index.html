<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>밭 배치 플래너</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Field Layout Planner</p>
        <h1>알칸시아 배치테스트</h1>
        <div class="legend">
          <span><i class="legend-swatch tile"></i>현재 밭</span>
          <span><i class="legend-swatch add"></i>확장 가능</span>
        </div>
      </section>

      <section class="planner-card">
        <div class="planner-toolbar">
          <div>
            <h2>현재 배치</h2>
            <p id="field-summary">밭 칸 수 계산 중...</p>
          </div>
          <div class="toolbar-actions">
            <button id="toggle-pan-lock-button" type="button">이동 가능</button>
            <button id="copy-layout-button" type="button">배치도 복사</button>
            <button id="expand-ring-button" type="button">한단계 확장</button>
            <button id="clear-crops-button" type="button">작물 비우기</button>
            <button id="reset-button" type="button">초기화</button>
          </div>
        </div>
        <div id="crop-palette" class="crop-palette horizontal" aria-label="작물 선택"></div>
        <div class="canvas-wrap">
          <canvas
            id="field-canvas"
            width="1200"
            height="900"
            aria-label="밭 배치 시뮬레이터"
          ></canvas>
          <div id="slot-tooltip" class="slot-tooltip" hidden></div>
        </div>
        <section class="stats-panel">
          <div class="stats-header">
            <h3>생산 현황</h3>
            <p id="production-summary">집계 계산 중...</p>
          </div>
          <div id="production-grid" class="production-grid"></div>
          <p id="copy-feedback" class="copy-feedback" hidden></p>
        </section>
        <p class="site-note">
          이 사이트는 알칸시아 제작자가 운영하는 공식 사이트가 아니며, 팬이 만든 비공식 배치 테스트 도구입니다.
        </p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
